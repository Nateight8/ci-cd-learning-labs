name: hello-world
on: workflow_dispatch
jobs:
  hello-world-job:
    runs-on: ubuntu-latest
    steps:
      - name: Hello World
        run: echo "Hello World"

      - name: Hello in py
        run: python -c "print('Hello in python')"

      - name: Hello in python with no explicit bash shell
        run: print('Hello from explicit bash shell')
