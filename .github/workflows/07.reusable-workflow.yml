name: Reusable Workflow
on:
  workflow_call:
    inputs:
      name:
        type: string
        required: true
        description: Name to greet

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Greeting
        run: |
          echo '*** Welcome to the Reusable Workflow ***'
          echo 'This job was triggered by ${{inputs.name}}.'
